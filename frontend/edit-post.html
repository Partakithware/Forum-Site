<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post — FMGP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace-autoloader.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script>function type_helper(s){document.getElementById('link-type').value=s;}</script>
</head>
<body class="sl-theme-dark">
  <div class="container">
    <header>
      <div class="header-brand">
        <h1 onclick="window.location.href='index.html'">FMGP</h1>
        <h4>FindMyGamePlease</h4>
      </div>
      <sl-button id="back-btn" variant="default" size="small">
        <sl-icon slot="prefix" name="arrow-left"></sl-icon>
        Back
      </sl-button>
    </header>

    <div id="loading-container" class="loading">
      <sl-spinner style="font-size: 2rem;"></sl-spinner>
      <p>Loading post...</p>
    </div>

    <div class="post-form-card" id="form-container" style="display: none;">
      <div class="post-form-title">
        <sl-icon name="pencil"></sl-icon>
        Edit Post
      </div>

      <form id="edit-form">
        <sl-select id="category-select" name="category" label="Category" required size="large" style="margin-bottom: 1rem;">
          <sl-icon name="folder" slot="prefix"></sl-icon>
        </sl-select>

        <sl-input id="title-input" name="title" label="Post Title" required size="large" style="margin-bottom: 1.25rem;">
          <sl-icon name="pencil" slot="prefix"></sl-icon>
        </sl-input>

        <div class="editor-container">
          <label class="editor-label">Content *</label>
          <div class="bb-toolbar">
            <button type="button" class="bb-btn" data-tag="b"><sl-icon name="type-bold"></sl-icon> Bold</button>
            <button type="button" class="bb-btn" data-tag="i"><sl-icon name="type-italic"></sl-icon> Italic</button>
            <button type="button" class="bb-btn" data-tag="u"><sl-icon name="type-underline"></sl-icon> Underline</button>
            <button type="button" class="bb-btn" data-tag="s"><sl-icon name="type-strikethrough"></sl-icon> Strike</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="size"><sl-icon name="fonts"></sl-icon> Size</button>
            <button type="button" class="bb-btn" data-tag="color"><sl-icon name="palette"></sl-icon> Color</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="left"><sl-icon name="text-left"></sl-icon></button>
            <button type="button" class="bb-btn" data-tag="center"><sl-icon name="text-center"></sl-icon></button>
            <button type="button" class="bb-btn" data-tag="right"><sl-icon name="text-right"></sl-icon></button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="code"><sl-icon name="code"></sl-icon> Code</button>
            <button type="button" class="bb-btn" data-tag="quote"><sl-icon name="quote"></sl-icon> Quote</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="url"><sl-icon name="link-45deg"></sl-icon> Link</button>
            <button type="button" class="bb-btn" data-tag="img"><sl-icon name="image"></sl-icon> Image</button>
          </div>
          <div class="editor-tabs">
            <button type="button" class="editor-tab active" data-tab="write">✍️ Write</button>
            <button type="button" class="editor-tab" data-tab="preview">👁️ Preview</button>
          </div>
          <div class="editor-content">
            <textarea id="content-textarea" name="content" required></textarea>
            <div id="preview-pane" class="preview-pane"></div>
          </div>
        </div>

        <sl-input id="link-input" name="link" label="Link (Optional)" type="url" size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="link-45deg" slot="prefix"></sl-icon>
        </sl-input>
        <sl-input id="linkvt-input" name="linkvt" label="VirusTotal Scan URL" type="url" size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="shield-check" slot="prefix"></sl-icon>
        </sl-input>
        <sl-input id="linkjt-input" name="linkjt" label="Jotti's Malware Scan URL" type="url" size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="bug" slot="prefix"></sl-icon>
        </sl-input>

        <div class="quick-actions">
          <div class="quick-actions-label">Quick Link Type</div>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="MediaFire" onclick="type_helper('MediaFire')">
            <sl-icon slot="prefix" name="cloud-arrow-up"></sl-icon> MediaFire
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Mega" onclick="type_helper('Mega')">
            <sl-icon slot="prefix" name="cloud"></sl-icon> Mega
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Download" onclick="type_helper('Download')">
            <sl-icon slot="prefix" name="download"></sl-icon> Download
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Other" onclick="type_helper('Other')">
            <sl-icon slot="prefix" name="link-45deg"></sl-icon> Other
          </sl-button>
        </div>
        <input type="hidden" name="link_type" id="link-type">

        <div class="button-group">
          <sl-button type="submit" variant="primary" size="large">
            <sl-icon slot="prefix" name="check-circle"></sl-icon> Save Changes
          </sl-button>
          <sl-button type="button" id="cancel-btn" variant="default" size="large">Cancel</sl-button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    const API_URL = 'http://localhost:3000/api';
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    const textarea = document.getElementById('content-textarea');
    const previewPane = document.getElementById('preview-pane');
    let currentPost = null;

    if (!postId) { alert('No post ID specified'); window.location.href = 'index.html'; }

    function parseBBCode(text) {
      let html = text;
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/\[b\](.*?)\[\/b\]/gi, '<b>$1</b>');
      html = html.replace(/\[i\](.*?)\[\/i\]/gi, '<i>$1</i>');
      html = html.replace(/\[u\](.*?)\[\/u\]/gi, '<u>$1</u>');
      html = html.replace(/\[s\](.*?)\[\/s\]/gi, '<s>$1</s>');
      html = html.replace(/\[size=(\d+)\](.*?)\[\/size\]/gi, '<span style="font-size: $1px">$2</span>');
      html = html.replace(/\[size=(small|medium|large|huge)\](.*?)\[\/size\]/gi, function(match, size, content) {
        const sizes = { small: '0.85em', medium: '1em', large: '1.3em', huge: '1.6em' };
        return `<span style="font-size: ${sizes[size] || '1em'}">${content}</span>`;
      });
      html = html.replace(/\[color=(#[0-9a-fA-F]{6}|#[0-9a-fA-F]{3}|[a-z]+)\](.*?)\[\/color\]/gi, '<span style="color: $1">$2</span>');
      html = html.replace(/\[left\](.*?)\[\/left\]/gi, '<div style="text-align: left">$1</div>');
      html = html.replace(/\[center\](.*?)\[\/center\]/gi, '<div style="text-align: center">$1</div>');
      html = html.replace(/\[right\](.*?)\[\/right\]/gi, '<div style="text-align: right">$1</div>');
      html = html.replace(/\[code\](.*?)\[\/code\]/gi, '<code>$1</code>');
      html = html.replace(/\[pre\](.*?)\[\/pre\]/gis, '<pre><code>$1</code></pre>');
      html = html.replace(/\[quote\](.*?)\[\/quote\]/gis, '<blockquote>$1</blockquote>');
      html = html.replace(/\[quote=(.*?)\](.*?)\[\/quote\]/gis, '<blockquote><b>$1 said:</b><br>$2</blockquote>');
      html = html.replace(/\[url=(.*?)\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank">$2</a>');
      html = html.replace(/\[url\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank">$1</a>');
      html = html.replace(/\[img\](.*?)\[\/img\]/gi, '<img src="$1" alt="Image">');
      html = html.replace(/\[list\](.*?)\[\/list\]/gis, '<ul>$1</ul>');
      html = html.replace(/\[\*\](.*?)(?=\[\*\]|\[\/list\])/gi, '<li>$1</li>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    document.querySelectorAll('.bb-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        const start = textarea.selectionStart, end = textarea.selectionEnd;
        const selectedText = textarea.value.substring(start, end);
        const before = textarea.value.substring(0, start), after = textarea.value.substring(end);
        let insertion = '';
        if (tag === 'url') { const url = prompt('Enter URL:'); if (url) insertion = selectedText ? `[url=${url}]${selectedText}[/url]` : `[url=${url}]Link text[/url]`; }
        else if (tag === 'img') { const url = prompt('Enter image URL:'); if (url) insertion = `[img]${url}[/img]`; }
        else if (tag === 'size') { const size = prompt('Enter size:'); if (size) insertion = selectedText ? `[size=${size}]${selectedText}[/size]` : `[size=${size}]text[/size]`; }
        else if (tag === 'color') { const color = prompt('Enter color:'); if (color) insertion = selectedText ? `[color=${color}]${selectedText}[/color]` : `[color=${color}]text[/color]`; }
        else if (['left','center','right'].includes(tag)) insertion = selectedText ? `[${tag}]${selectedText}[/${tag}]` : `[${tag}]text[/${tag}]`;
        else insertion = selectedText ? `[${tag}]${selectedText}[/${tag}]` : `[${tag}]text[/${tag}]`;
        if (insertion) { textarea.value = before + insertion + after; textarea.focus(); updatePreview(); }
      });
    });

    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (tab.dataset.tab === 'preview') { textarea.style.display = 'none'; previewPane.classList.add('active'); updatePreview(); }
        else { textarea.style.display = 'block'; previewPane.classList.remove('active'); }
      });
    });

    function updatePreview() {
      previewPane.innerHTML = parseBBCode(textarea.value) || '<p style="color: var(--text-muted);">Nothing to preview...</p>';
    }

    textarea.addEventListener('input', () => { if (previewPane.classList.contains('active')) updatePreview(); });

    async function loadCategories() {
      try {
        const response = await fetch(`${API_URL}/categories`);
        const categories = await response.json();
        const select = document.getElementById('category-select');
        categories.forEach(category => {
          const option = document.createElement('sl-option');
          option.value = category.slug; option.textContent = category.name;
          select.appendChild(option);
          if (category.subcategories) {
            category.subcategories.forEach(sub => {
              const subOption = document.createElement('sl-option');
              subOption.value = sub.slug; subOption.textContent = `  ↳ ${sub.name}`;
              select.appendChild(subOption);
            });
          }
        });
      } catch (error) { console.error('Failed to load categories:', error); }
    }

    async function loadPost() {
      try {
        const response = await fetch(`${API_URL}/posts/${postId}`);
        if (!response.ok) throw new Error('Post not found');
        currentPost = await response.json();
        const authResponse = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
        if (!authResponse.ok) { alert('Please login to edit posts'); window.location.href = 'login.html'; return; }
        const currentUser = await authResponse.json();
        const canEdit = ['Owner', 'Admin', 'Moderator'].includes(currentUser.user.role) || currentUser.user.id === currentPost.user_id;
        if (!canEdit) { alert('You do not have permission to edit this post'); window.location.href = `post.html?id=${postId}`; return; }
        document.getElementById('title-input').value = currentPost.title;
        document.getElementById('content-textarea').value = currentPost.content;
        document.getElementById('category-select').value = currentPost.category_slug;
        document.getElementById('link-input').value = currentPost.link || '';
        document.getElementById('linkvt-input').value = currentPost.linkvt || '';
        document.getElementById('linkjt-input').value = currentPost.linkjt || '';
        document.getElementById('link-type').value = currentPost.link_type || '';
        document.getElementById('loading-container').style.display = 'none';
        document.getElementById('form-container').style.display = 'block';
      } catch (error) { alert('Failed to load post: ' + error.message); window.location.href = 'index.html'; }
    }

    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('link-type').value = btn.dataset.type;
        document.querySelectorAll('.link-btn').forEach(b => b.variant = 'default');
        btn.variant = 'primary';
      });
    });

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const submitBtn = e.target.querySelector('sl-button[type="submit"]');
      submitBtn.loading = true;
      try {
        const response = await fetch(`${API_URL}/posts/${postId}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
          body: JSON.stringify({ title: formData.get('title'), content: formData.get('content'), link: formData.get('link') || null, linkvt: formData.get('linkvt') || null, linkjt: formData.get('linkjt') || null, link_type: formData.get('link_type') || null, category_slug: document.getElementById('category-select').value })
        });
        if (response.ok) { alert('Post updated successfully!'); window.location.href = `post.html?id=${postId}`; }
        else { const error = await response.json(); alert(error.error || 'Failed to update post'); }
      } catch (error) { alert('Failed to update post. Please try again.'); }
      finally { submitBtn.loading = false; }
    });

    document.getElementById('cancel-btn').addEventListener('click', () => { window.location.href = `post.html?id=${postId}`; });
    document.getElementById('back-btn').addEventListener('click', () => { window.location.href = `post.html?id=${postId}`; });

    loadCategories();
    loadPost();
  </script>
</body>
</html>
