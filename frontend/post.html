<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — FMGP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace-autoloader.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sl-theme-dark">
  <div class="container">
    <header>
      <div class="header-brand">
        <h1 onclick="window.location.href='index.html'">FMGP</h1>
        <h4>FindMyGamePlease</h4>
      </div>
      <sl-button href="index.html" variant="default" size="small">
        <sl-icon slot="prefix" name="arrow-left"></sl-icon>
        Back
      </sl-button>
    </header>

    <nav class="breadcrumb" id="breadcrumb">
      <a href="index.html">🏠 Home</a>
    </nav>

    <div id="post-container">
      <div class="loading">
        <sl-spinner style="font-size: 2rem;"></sl-spinner>
        <p>Loading post...</p>
      </div>
    </div>
  </div>

  <script type="module">
    const API_URL = 'http://localhost:3000/api';
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    function parseBBCode(text) {
      let html = text;
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/\[b\](.*?)\[\/b\]/gi, '<b>$1</b>');
      html = html.replace(/\[i\](.*?)\[\/i\]/gi, '<i>$1</i>');
      html = html.replace(/\[u\](.*?)\[\/u\]/gi, '<u>$1</u>');
      html = html.replace(/\[s\](.*?)\[\/s\]/gi, '<s>$1</s>');
      html = html.replace(/\[size=(\d+)\](.*?)\[\/size\]/gi, '<span style="font-size: $1px">$2</span>');
      html = html.replace(/\[size=(small|medium|large|huge)\](.*?)\[\/size\]/gi, function(match, size, content) {
        const sizes = { small: '0.85em', medium: '1em', large: '1.3em', huge: '1.6em' };
        return `<span style="font-size: ${sizes[size] || '1em'}">${content}</span>`;
      });
      html = html.replace(/\[color=(#[0-9a-fA-F]{6}|#[0-9a-fA-F]{3}|[a-z]+)\](.*?)\[\/color\]/gi, '<span style="color: $1">$2</span>');
      html = html.replace(/\[left\](.*?)\[\/left\]/gi, '<div style="text-align: left">$1</div>');
      html = html.replace(/\[center\](.*?)\[\/center\]/gi, '<div style="text-align: center">$1</div>');
      html = html.replace(/\[right\](.*?)\[\/right\]/gi, '<div style="text-align: right">$1</div>');
      html = html.replace(/\[code\](.*?)\[\/code\]/gi, '<code>$1</code>');
      html = html.replace(/\[pre\](.*?)\[\/pre\]/gis, '<pre><code>$1</code></pre>');
      html = html.replace(/\[quote=(.*?)\](.*?)\[\/quote\]/gis, '<blockquote><b>$1 said:</b><br>$2</blockquote>');
      html = html.replace(/\[quote\](.*?)\[\/quote\]/gis, '<blockquote>$1</blockquote>');
      html = html.replace(/\[url=(.*?)\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank" rel="noopener">$2</a>');
      html = html.replace(/\[url\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/\[img\](.*?)\[\/img\]/gi, '<img src="$1" alt="Image">');
      html = html.replace(/\[list\](.*?)\[\/list\]/gis, function(match, content) { return '<ul>' + content + '</ul>'; });
      html = html.replace(/\[\*\](.*?)(?=\[\*\]|\[\/list\]|<\/ul>)/gi, '<li>$1</li>');
      html = html.replace(/\[h1\](.*?)\[\/h1\]/gi, '<h1>$1</h1>');
      html = html.replace(/\[h2\](.*?)\[\/h2\]/gi, '<h2>$1</h2>');
      html = html.replace(/\[h3\](.*?)\[\/h3\]/gi, '<h3>$1</h3>');
      html = html.replace(/\n/g, '<br>');
      html = html.replace(/<pre>(.*?)<\/pre>/gis, function(match, content) { return '<pre>' + content.replace(/<br>/g, '\n') + '</pre>'; });
      return html;
    }

    if (!postId) {
      document.getElementById('post-container').innerHTML = '<div class="error">Post not found</div>';
    } else {
      loadPost();
    }

    async function loadPost() {
      try {
        const response = await fetch(`${API_URL}/posts/${postId}`);
        if (!response.ok) throw new Error('Post not found');
        const post = await response.json();

        let canEdit = false, canDelete = false;
        try {
          const authResponse = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
          if (authResponse.ok) {
            const authData = await authResponse.json();
            console.log('Full Auth Data:', authData);
            const user = authData.user || authData;
            const userRole = user.role || user.user_role || user.role_name;
            const userId = user.id || user.user_id;
            console.log('Detected Role:', userRole);
            const isStaff = ['Owner', 'Admin', 'Moderator'].includes(userRole);
            const isAuthor = userId === post.user_id;
            canEdit = isStaff || isAuthor;
            canDelete = isStaff || isAuthor;
          }
        } catch (error) { console.error('Auth check failed:', error); }

        document.getElementById('breadcrumb').innerHTML = `
          <a href="index.html">🏠 Home</a>
          <span>/</span>
          <a href="index.html?category=${post.category_slug}">${post.category_name}</a>
          <span>/</span>
          <span class="current">${escapeHtml(post.title)}</span>
        `;

        const parsedContent = parseBBCode(post.content);

        let roleBadge = '';
        if (post.user_role && post.user_role !== 'Member') {
          roleBadge = `<sl-badge variant="${getRoleBadgeVariant(post.user_role)}">${post.user_role}</sl-badge>`;
        }

        const actionButtons = (canEdit || canDelete) ? `
          <div class="post-actions">
            ${canEdit ? `<sl-button id="edit-btn" variant="primary" size="medium">
              <sl-icon slot="prefix" name="pencil"></sl-icon> Edit Post
            </sl-button>` : ''}
            ${canDelete ? `<sl-button id="delete-btn" variant="danger" size="medium">
              <sl-icon slot="prefix" name="trash"></sl-icon> Delete Post
            </sl-button>` : ''}
          </div>` : '';

        document.getElementById('post-container').innerHTML = `
          <div class="post-container">
            <div class="post-header">
              <h1 class="post-title">${escapeHtml(post.title)}</h1>
              <div class="post-meta">
                <span>👤 <a href="user-profile.html?id=${post.user_id}" class="username-link">${escapeHtml(post.username)}</a></span>
                ${roleBadge ? `<span>·</span>${roleBadge}` : ''}
                <span>·</span>
                <sl-badge variant="neutral">${post.category_name}</sl-badge>
                <span>·</span>
                <span>${formatDate(post.created_at)}</span>
                ${post.updated_at ? `<span>·</span><span style="font-style:italic;">Edited</span>` : ''}
              </div>
            </div>
            <div class="post-content">${parsedContent}</div>
            ${post.link ? `
              <div class="link-section">
                <h3><sl-icon name="link-45deg"></sl-icon> ${post.link_type || 'Attached Link'}</h3>
                <a href="${escapeHtml(post.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(post.link)}</a>
                <div class="scan-buttons">
                  <sl-button size="small" variant="default" href="${post.linkvt || 'https://www.virustotal.com/gui/url/' + encodeURIComponent(post.link)}" target="_blank">
                    <sl-icon slot="prefix" name="shield-check"></sl-icon> VirusTotal
                  </sl-button>
                  <sl-button size="small" variant="default" href="${post.linkjt || 'https://virusscan.jotti.org/en-US/scan-url?url=' + encodeURIComponent(post.link)}" target="_blank">
                    <sl-icon slot="prefix" name="bug"></sl-icon> Jotti Scan
                  </sl-button>
                </div>
              </div>` : ''}
          </div>
          ${actionButtons}
        `;

        if (canEdit) {
          document.getElementById('edit-btn').addEventListener('click', () => {
            window.location.href = `edit-post.html?id=${postId}`;
          });
        }
        if (canDelete) {
          document.getElementById('delete-btn').addEventListener('click', async () => {
            if (confirm('Are you sure you want to delete this post? This cannot be undone.')) {
              try {
                const deleteResponse = await fetch(`${API_URL}/posts/${postId}`, { method: 'DELETE', credentials: 'include' });
                if (deleteResponse.ok) { alert('Post deleted successfully'); window.location.href = `index.html?category=${post.category_slug}`; }
                else { const error = await deleteResponse.json(); alert(error.error || 'Failed to delete post'); }
              } catch (error) { alert('Failed to delete post. Please try again.'); }
            }
          });
        }
      } catch (error) {
        console.error('Failed to load post:', error);
        document.getElementById('post-container').innerHTML = '<div class="error">Failed to load post 😢</div>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return 'just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString() + ' at ' + date.toLocaleTimeString();
    }

    function getRoleBadgeVariant(role) {
      const variants = { 'Owner': 'danger', 'Admin': 'warning', 'Moderator': 'success', 'Developer': 'primary' };
      return variants[role] || 'neutral';
    }
  </script>
</body>
</html>
