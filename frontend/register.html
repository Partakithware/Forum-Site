<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FMGP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace-autoloader.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sl-theme-dark auth-page">
  <div class="form-container">
    <div class="form-card">
      <h2>Join Us</h2>
      <form id="register-form">
        <sl-input name="username" label="Username" required minlength="3" autocomplete="username" size="large" help-text="At least 3 characters" style="margin-bottom: 1rem;">
          <sl-icon name="person-add" slot="prefix"></sl-icon>
        </sl-input>
        <sl-input name="password" label="Password" type="password" required minlength="6" password-toggle autocomplete="new-password" size="large" help-text="At least 6 characters" style="margin-bottom: 1.5rem;">
          <sl-icon name="lock" slot="prefix"></sl-icon>
        </sl-input>
        <sl-button type="submit" variant="primary" size="large" style="width: 100%;">
          <sl-icon slot="prefix" name="person-check"></sl-icon>
          Create Account
        </sl-button>
      </form>
      <div style="text-align:center; margin-top: 1rem;">
        <sl-button href="index.html" variant="text" size="small">Cancel</sl-button>
      </div>
      <p class="footer-text">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script type="module">
    const API_URL = 'http://localhost:3000/api';
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const submitBtn = e.target.querySelector('sl-button[type="submit"]');
      submitBtn.loading = true;
      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: formData.get('username'), password: formData.get('password') })
        });
        if (response.ok) { alert('🎉 Registration successful! Please login.'); window.location.href = 'login.html'; }
        else { const error = await response.json(); alert(error.error || 'Registration failed. Please try again.'); }
      } catch (error) { alert('Registration failed. Please try again.'); }
      finally { submitBtn.loading = false; }
    });
  </script>
</body>
</html>
