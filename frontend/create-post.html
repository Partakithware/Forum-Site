<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post — FMGP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/themes/dark.css">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.12.0/cdn/shoelace-autoloader.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="sl-theme-dark">
  <div class="container">
    <header>
      <div class="header-brand">
        <h1 onclick="window.location.href='index.html'">FMGP</h1>
        <h4>FindMyGamePlease</h4>
      </div>
      <sl-button href="index.html" variant="default" size="small">
        <sl-icon slot="prefix" name="arrow-left"></sl-icon>
        Back
      </sl-button>
    </header>

    <div class="post-form-card">
      <div class="post-form-title">
        <sl-icon name="plus-circle"></sl-icon>
        Create New Post
      </div>

      <form id="post-form">
        <sl-select id="category-select" name="category" label="Category" required placeholder="Select a category" size="large" style="margin-bottom: 1rem;">
          <sl-icon name="folder" slot="prefix"></sl-icon>
        </sl-select>

        <sl-input name="title" label="Post Title" required placeholder="Enter a descriptive title" size="large" style="margin-bottom: 1.25rem;">
          <sl-icon name="pencil" slot="prefix"></sl-icon>
        </sl-input>

        <div class="editor-container">
          <label class="editor-label">Content *</label>
          <div class="bb-toolbar">
            <button type="button" class="bb-btn" data-tag="b"><sl-icon name="type-bold"></sl-icon> Bold</button>
            <button type="button" class="bb-btn" data-tag="i"><sl-icon name="type-italic"></sl-icon> Italic</button>
            <button type="button" class="bb-btn" data-tag="u"><sl-icon name="type-underline"></sl-icon> Underline</button>
            <button type="button" class="bb-btn" data-tag="s"><sl-icon name="type-strikethrough"></sl-icon> Strike</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="size"><sl-icon name="fonts"></sl-icon> Size</button>
            <button type="button" class="bb-btn" data-tag="color"><sl-icon name="palette"></sl-icon> Color</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="left"><sl-icon name="text-left"></sl-icon></button>
            <button type="button" class="bb-btn" data-tag="center"><sl-icon name="text-center"></sl-icon></button>
            <button type="button" class="bb-btn" data-tag="right"><sl-icon name="text-right"></sl-icon></button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="code"><sl-icon name="code"></sl-icon> Code</button>
            <button type="button" class="bb-btn" data-tag="quote"><sl-icon name="quote"></sl-icon> Quote</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="url"><sl-icon name="link-45deg"></sl-icon> Link</button>
            <button type="button" class="bb-btn" data-tag="img"><sl-icon name="image"></sl-icon> Image</button>
            <div class="bb-separator"></div>
            <button type="button" class="bb-btn" data-tag="list"><sl-icon name="list-ul"></sl-icon> List</button>
            <button type="button" class="bb-btn" data-tag="*"><sl-icon name="dot"></sl-icon> Item</button>
          </div>
          <div class="editor-tabs">
            <button type="button" class="editor-tab active" data-tab="write">✍️ Write</button>
            <button type="button" class="editor-tab" data-tab="preview">👁️ Preview</button>
          </div>
          <div class="editor-content">
            <textarea id="content-textarea" name="content" required placeholder="Write your post here...&#10;&#10;[b]Bold[/b]  [i]Italic[/i]  [u]Underline[/u]&#10;[size=large]Large text[/size]&#10;[color=red]Red text[/color]&#10;[url=https://example.com]Link[/url]&#10;[quote]Quoted text[/quote]&#10;[code]inline code[/code]"></textarea>
            <div id="preview-pane" class="preview-pane"></div>
          </div>
        </div>

        <sl-input name="link" label="Link (Optional)" type="url" placeholder="https://example.com/file" size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="link-45deg" slot="prefix"></sl-icon>
        </sl-input>
        <sl-input name="linkvt" label="VirusTotal Scan URL" type="url" placeholder="https://virustotal.com/..." size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="shield-check" slot="prefix"></sl-icon>
        </sl-input>
        <sl-input name="linkjt" label="Jotti's Malware Scan URL" type="url" placeholder="https://virusscan.jotti.org/..." size="large" style="margin-bottom: 0.875rem;">
          <sl-icon name="bug" slot="prefix"></sl-icon>
        </sl-input>

        <div class="quick-actions">
          <div class="quick-actions-label">Quick Link Type</div>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="MediaFire">
            <sl-icon slot="prefix" name="cloud-arrow-up"></sl-icon> MediaFire
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Mega">
            <sl-icon slot="prefix" name="cloud"></sl-icon> Mega
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Download">
            <sl-icon slot="prefix" name="download"></sl-icon> Download
          </sl-button>
          <sl-button type="button" variant="default" size="small" class="link-btn" data-type="Other">
            <sl-icon slot="prefix" name="link-45deg"></sl-icon> Other
          </sl-button>
        </div>
        <input type="hidden" name="link_type" id="link-type">

        <div class="button-group">
          <sl-button type="submit" variant="primary" size="large">
            <sl-icon slot="prefix" name="check-circle"></sl-icon> Publish Post
          </sl-button>
          <sl-button type="button" href="index.html" variant="default" size="large">Cancel</sl-button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    const API_URL = 'http://localhost:3000/api';
    const textarea = document.getElementById('content-textarea');
    const previewPane = document.getElementById('preview-pane');

    function parseBBCode(text) {
      let html = text;
      html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/\[b\](.*?)\[\/b\]/gi, '<b>$1</b>');
      html = html.replace(/\[i\](.*?)\[\/i\]/gi, '<i>$1</i>');
      html = html.replace(/\[u\](.*?)\[\/u\]/gi, '<u>$1</u>');
      html = html.replace(/\[s\](.*?)\[\/s\]/gi, '<s>$1</s>');
      html = html.replace(/\[size=(\d+)\](.*?)\[\/size\]/gi, '<span style="font-size: $1px">$2</span>');
      html = html.replace(/\[size=(small|medium|large|huge)\](.*?)\[\/size\]/gi, function(match, size, content) {
        const sizes = { small: '0.85em', medium: '1em', large: '1.3em', huge: '1.6em' };
        return `<span style="font-size: ${sizes[size] || '1em'}">${content}</span>`;
      });
      html = html.replace(/\[color=(#[0-9a-fA-F]{6}|#[0-9a-fA-F]{3}|[a-z]+)\](.*?)\[\/color\]/gi, '<span style="color: $1">$2</span>');
      html = html.replace(/\[left\](.*?)\[\/left\]/gi, '<div style="text-align: left">$1</div>');
      html = html.replace(/\[center\](.*?)\[\/center\]/gi, '<div style="text-align: center">$1</div>');
      html = html.replace(/\[right\](.*?)\[\/right\]/gi, '<div style="text-align: right">$1</div>');
      html = html.replace(/\[code\](.*?)\[\/code\]/gi, '<code>$1</code>');
      html = html.replace(/\[pre\](.*?)\[\/pre\]/gis, '<pre><code>$1</code></pre>');
      html = html.replace(/\[quote\](.*?)\[\/quote\]/gis, '<blockquote>$1</blockquote>');
      html = html.replace(/\[quote=(.*?)\](.*?)\[\/quote\]/gis, '<blockquote><b>$1 said:</b><br>$2</blockquote>');
      html = html.replace(/\[url=(.*?)\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank" rel="noopener">$2</a>');
      html = html.replace(/\[url\](.*?)\[\/url\]/gi, '<a href="$1" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/\[img\](.*?)\[\/img\]/gi, '<img src="$1" alt="Image">');
      html = html.replace(/\[list\](.*?)\[\/list\]/gis, '<ul>$1</ul>');
      html = html.replace(/\[\*\](.*?)(?=\[\*\]|\[\/list\])/gi, '<li>$1</li>');
      html = html.replace(/\[h1\](.*?)\[\/h1\]/gi, '<h1>$1</h1>');
      html = html.replace(/\[h2\](.*?)\[\/h2\]/gi, '<h2>$1</h2>');
      html = html.replace(/\[h3\](.*?)\[\/h3\]/gi, '<h3>$1</h3>');
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    document.querySelectorAll('.bb-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const selectedText = textarea.value.substring(start, end);
        const before = textarea.value.substring(0, start);
        const after = textarea.value.substring(end);
        let insertion = '';
        if (tag === 'url') { const url = prompt('Enter URL:'); if (url) insertion = selectedText ? `[url=${url}]${selectedText}[/url]` : `[url=${url}]Link text[/url]`; }
        else if (tag === 'img') { const url = prompt('Enter image URL:'); if (url) insertion = `[img]${url}[/img]`; }
        else if (tag === 'size') { const size = prompt('Text size (e.g. 16, or small/medium/large/huge):'); if (size) insertion = selectedText ? `[size=${size}]${selectedText}[/size]` : `[size=${size}]text[/size]`; }
        else if (tag === 'color') { const color = prompt('Color (name or hex, e.g. red or #ff0000):'); if (color) insertion = selectedText ? `[color=${color}]${selectedText}[/color]` : `[color=${color}]text[/color]`; }
        else if (['left','center','right'].includes(tag)) insertion = selectedText ? `[${tag}]${selectedText}[/${tag}]` : `[${tag}]text[/${tag}]`;
        else if (tag === 'list') insertion = `[list]\n[*]Item 1\n[*]Item 2\n[*]Item 3\n[/list]`;
        else if (tag === '*') insertion = `[*]${selectedText || 'List item'}`;
        else insertion = selectedText ? `[${tag}]${selectedText}[/${tag}]` : `[${tag}]text[/${tag}]`;
        if (insertion) { textarea.value = before + insertion + after; textarea.focus(); updatePreview(); }
      });
    });

    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        if (tab.dataset.tab === 'preview') { textarea.style.display = 'none'; previewPane.classList.add('active'); updatePreview(); }
        else { textarea.style.display = 'block'; previewPane.classList.remove('active'); }
      });
    });

    function updatePreview() {
      previewPane.innerHTML = parseBBCode(textarea.value) || '<p style="color: var(--text-muted);">Nothing to preview yet...</p>';
    }

    textarea.addEventListener('input', () => { if (previewPane.classList.contains('active')) updatePreview(); });

    async function loadCategories() {
      try {
        const response = await fetch(`${API_URL}/categories`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const categories = await response.json();
        const select = document.getElementById('category-select');
        if (categories.length === 0) { alert('No categories available. Please contact administrator.'); return; }
        categories.forEach(category => {
          const option = document.createElement('sl-option');
          option.value = category.slug; option.textContent = category.name;
          select.appendChild(option);
          if (category.subcategories) {
            category.subcategories.forEach(sub => {
              const subOption = document.createElement('sl-option');
              subOption.value = sub.slug; subOption.textContent = `  ↳ ${sub.name}`;
              select.appendChild(subOption);
            });
          }
        });
      } catch (error) { console.error('Failed to load categories:', error); alert('Failed to load categories: ' + error.message); }
    }

    document.querySelectorAll('.link-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('link-type').value = btn.dataset.type;
        document.querySelectorAll('.link-btn').forEach(b => b.variant = 'default');
        btn.variant = 'primary';
      });
    });

    async function checkAuth() {
      try {
        const response = await fetch(`${API_URL}/auth/me`, { credentials: 'include' });
        if (!response.ok) { alert('Please login to create a post'); window.location.href = 'login.html'; }
      } catch (error) { alert('Please login to create a post'); window.location.href = 'login.html'; }
    }

    document.getElementById('post-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const submitBtn = e.target.querySelector('sl-button[type="submit"]');
      const category = document.getElementById('category-select').value;
      if (!category) { alert('Please select a category'); return; }
      submitBtn.loading = true;
      try {
        const response = await fetch(`${API_URL}/posts`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
          body: JSON.stringify({ title: formData.get('title'), content: formData.get('content'), link: formData.get('link') || null, linkvt: formData.get('linkvt') || null, linkjt: formData.get('linkjt') || null, link_type: formData.get('link_type') || null, category_slug: category })
        });
        if (response.ok) { window.location.href = `index.html?category=${category}`; }
        else { const error = await response.json(); alert(error.error || 'Failed to create post'); }
      } catch (error) { alert('Failed to create post. Please try again.'); }
      finally { submitBtn.loading = false; }
    });

    checkAuth();
    loadCategories();
  </script>
</body>
</html>
